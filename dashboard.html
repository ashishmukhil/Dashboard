<!DOCTYPE html>
<html>
<head>
  <title>PO Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    th {
      background: #007bff;
      color: white;
    }
    tr:hover {
      background: #f1f1f1;
    }
    .status {
      padding: 5px 10px;
      border-radius: 5px;
      color: white;
      font-size: 12px;
    }
    .pending { background: orange; }
    .progress { background: blue; }
    .done { background: green; }
  </style>
</head>

<body>

<h1>📊 Project Dashboard</h1>

<table id="dataTable">
  <thead>
    <tr>
      <th>PO Number</th>
      <th>Project</th>
      <th>Product</th>
      <th>SKU</th>
      <th>Start Date</th>
      <th>End Date</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://sddtphskihjlmlhqqgeq.supabase.co/rest/v1/Nxgsecure_1";
const API_KEY = "sb_publishable_T30VIdg_rmLBdIXShKmVNQ_YcpCqW7y";

fetch(API_URL, {
  headers: {
    "apikey": API_KEY,
    "Authorization": "Bearer " + API_KEY
  }
})
.then(res => res.json())
.then(data => {
  const table = document.querySelector("#dataTable tbody");

  data.forEach(row => {
    let statusClass = "pending";

    if (row.status === "In Progress") statusClass = "progress";
    if (row.status === "Completed") statusClass = "done";

    table.innerHTML += `
      <tr>
        <td>${row.po_number}</td>
        <td>${row.project_name}</td>
        <td>${row.product}</td>
        <td>${row.sku}</td>
        <td>${row.start_date}</td>
        <td>${row.end_date}</td>
        <td><span class="status ${statusClass}">${row.status}</span></td>
      </tr>
    `;
  });
});
</script>

</body>
</html>
